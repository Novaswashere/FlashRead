<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FlashRead | RSVP Reader</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed": "#131b2e",
                    "primary-container": "#2563eb",
                    "tertiary-fixed-dim": "#ffb596",
                    "surface-container-highest": "#e0e3e5",
                    "inverse-primary": "#b4c5ff",
                    "tertiary": "#943700",
                    "surface-dim": "#d8dadc",
                    "inverse-surface": "#2d3133",
                    "on-error": "#ffffff",
                    "surface-dark": "#0B0E14",
                    "on-secondary": "#ffffff",
                    "primary-fixed": "#dbe1ff",
                    "on-surface": "#191c1e",
                    "background": "#f7f9fb",
                    "on-background": "#191c1e",
                    "on-secondary-fixed-variant": "#3f465c",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#eceef0",
                    "surface-tint": "#0053db",
                    "on-primary-container": "#eeefff",
                    "inverse-on-surface": "#eff1f3",
                    "on-primary-fixed-variant": "#003ea8",
                    "border-subtle": "#E2E8F0",
                    "on-error-container": "#93000a",
                    "surface-bright": "#f7f9fb",
                    "error": "#ba1a1a",
                    "on-secondary-container": "#5c647a",
                    "on-tertiary-fixed": "#360f00",
                    "orp-highlight": "#EF4444",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "outline": "#737686",
                    "secondary-fixed-dim": "#bec6e0",
                    "secondary-fixed": "#dae2fd",
                    "tertiary-fixed": "#ffdbcd",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#c3c6d7",
                    "surface-container-high": "#e6e8ea",
                    "error-container": "#ffdad6",
                    "on-tertiary-container": "#ffede6",
                    "tertiary-container": "#bc4800",
                    "surface-container-low": "#f2f4f6",
                    "on-surface-variant": "#434655",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-primary": "#ffffff",
                    "surface": "#f7f9fb",
                    "secondary-container": "#dae2fd",
                    "primary": "#004ac6",
                    "on-primary-fixed": "#00174b",
                    "reader-sepia": "#F4ECD8",
                    "surface-variant": "#e0e3e5",
                    "secondary": "#565e74"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "container-max": "1200px",
                    "reader-width": "680px",
                    "unit": "4px",
                    "space-xl": "48px",
                    "space-lg": "24px",
                    "space-md": "16px",
                    "space-sm": "8px",
                    "space-xs": "4px"
            },
            "fontFamily": {
                    "headline-lg": ["Inter"],
                    "body-md": ["Inter"],
                    "display-rsvp-mobile": ["Inter"],
                    "label-mono": ["JetBrains Mono"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "display-rsvp": ["Inter"]
            },
            "fontSize": {
                    "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                    "body-md": ["16px", { "lineHeight": "28px", "fontWeight": "400" }],
                    "display-rsvp-mobile": ["36px", { "lineHeight": "1.1", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                    "label-mono": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                    "body-lg": ["18px", { "lineHeight": "32px", "fontWeight": "400" }],
                    "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                    "display-rsvp": ["48px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600" }]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .orp-marker::before, .orp-marker::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 12px;
            background-color: #EF4444;
            opacity: 0.4;
        }
        .orp-marker::before { top: -20px; }
        .orp-marker::after { bottom: -20px; }

        /* Custom range slider styling */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #E2E8F0;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #004ac6;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -6px;
        }
        .glass-dock {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col overflow-hidden">
<!-- Top App Bar (Header) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md border-b border-border-subtle">
<div class="flex items-center justify-between px-space-lg h-16 max-w-container-max mx-auto">
<div class="flex items-center gap-space-md">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors active:scale-95" onclick="history.back()">
                    arrow_back
                </button>
<div class="flex flex-col">
<h1 class="font-headline-md text-[18px] leading-none text-on-surface">The Great Gatsby</h1>
<p class="font-label-mono text-[10px] text-on-surface-variant uppercase tracking-widest mt-1">Chapter III • 12% Complete</p>
</div>
</div>
<div class="flex items-center gap-space-sm">
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors">
                    text_fields
                </button>
<button class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-low p-2 rounded-full transition-colors">
                    more_vert
                </button>
</div>
</div>
</header>
<!-- Main RSVP Canvas -->
<main class="flex-grow flex items-center justify-center relative px-space-md">
<div class="max-w-reader-width w-full h-96 flex flex-col items-center justify-center relative">
<!-- Focus Crosshairs (Subtle Visual Guides) -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center">
<div class="w-full h-px bg-border-subtle opacity-30"></div>
<div class="orp-marker absolute h-full flex items-center justify-center"></div>
</div>
<!-- The Word Display -->
<div class="relative z-10 select-none cursor-pointer group" id="rsvp-container" onclick="togglePlay()">
<!-- Example word: "Sophistication" -->
<div class="flex font-display-rsvp text-display-rsvp-mobile md:text-display-rsvp tracking-tight">
<span class="text-on-surface">Sophis</span><span class="text-orp-highlight">t</span><span class="text-on-surface">ication</span>
</div>
</div>
<!-- Transition Shadow Effect (Atmospheric) -->
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-32 h-1 bg-primary/20 blur-xl opacity-0 transition-opacity duration-300" id="pulse-glow"></div>
</div>
</main>
<!-- Controls Dock -->
<footer class="fixed bottom-space-xl left-1/2 -translate-x-1/2 w-full max-w-[600px] px-space-md z-50">
<div class="glass-dock rounded-xl p-space-md shadow-sm flex flex-col gap-space-md">
<!-- Scrubbing/Progress Bar -->
<div class="group relative px-2">
<div class="flex justify-between mb-2">
<span class="font-label-mono text-on-surface-variant">04:12</span>
<span class="font-label-mono text-on-surface-variant">18:45 remaining</span>
</div>
<input class="w-full h-1" max="100" min="0" type="range" value="12"/>
</div>
<!-- Playback Controls Cluster -->
<div class="flex items-center justify-between">
<!-- Speed Display -->
<button class="flex flex-col items-start hover:bg-surface-container-low px-3 py-1 rounded-lg transition-colors active:scale-95" onclick="adjustSpeed()">
<span class="font-label-mono text-[10px] text-on-surface-variant uppercase">Speed</span>
<div class="flex items-baseline gap-1">
<span class="font-label-mono text-lg text-primary font-bold" id="wpm-display">450</span>
<span class="font-label-mono text-[10px] text-on-surface-variant">WPM</span>
</div>
</button>
<!-- Center Controls -->
<div class="flex items-center gap-space-lg">
<button class="material-symbols-outlined text-on-surface-variant text-2xl hover:text-primary transition-colors active:scale-90" title="Skip Back">
                        replay_10
                    </button>
<button class="w-14 h-14 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-lg hover:bg-primary-container transition-all active:scale-95" id="play-pause-btn" onclick="togglePlay()">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button class="material-symbols-outlined text-on-surface-variant text-2xl hover:text-primary transition-colors active:scale-90" title="Skip Forward">
                        forward_10
                    </button>
</div>
<!-- Session Stats -->
<div class="flex flex-col items-end px-3">
<span class="font-label-mono text-[10px] text-on-surface-variant uppercase">Progress</span>
<span class="font-label-mono text-lg text-on-surface">1.2k<span class="text-[10px] text-on-surface-variant font-normal ml-1">words</span></span>
</div>
</div>
</div>
</footer>
<!-- WPM Adjustment Modal (Hidden by default) -->
<div class="fixed inset-0 bg-inverse-surface/10 backdrop-blur-sm z-[60] flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200" id="speed-modal">
<div class="bg-surface-container-lowest p-space-xl rounded-xl border border-border-subtle shadow-xl w-80">
<h3 class="font-headline-md text-center mb-space-lg">Adjust Reading Speed</h3>
<div class="flex flex-col gap-space-md">
<input class="w-full" max="1000" min="100" oninput="updateWpmVal(this.value)" step="50" type="range" value="450"/>
<div class="text-center">
<span class="font-display-rsvp text-4xl text-primary" id="modal-wpm">450</span>
<span class="font-label-mono ml-2">WPM</span>
</div>
<button class="mt-space-lg w-full bg-primary text-on-primary py-3 rounded-full font-bold active:scale-95 transition-transform" onclick="closeSpeedModal()">
                    Apply Speed
                </button>
</div>
</div>
</div>
<script>
        let isPlaying = false;
        let wpm = 450;
        const playBtn = document.getElementById('play-pause-btn');
        const pulseGlow = document.getElementById('pulse-glow');
        const wpmDisplay = document.getElementById('wpm-display');
        const modalWpm = document.getElementById('modal-wpm');
        const speedModal = document.getElementById('speed-modal');
        const rsvpContainer = document.getElementById('rsvp-container');

        const words = [
            { start: "Sophis", orp: "t", end: "ication" },
            { start: "deman", orp: "d", end: "s" },
            { start: "uninter", orp: "r", end: "upted" },
            { start: "focu", orp: "s", end: "" },
            { start: "durin", orp: "g", end: "" },
            { start: "every", orp: "y", end: "" },
            { start: "sin", orp: "g", end: "le" },
            { start: "readin", orp: "g", end: "" },
            { start: "ses", orp: "s", end: "ion" }
        ];
        let wordIndex = 0;
        let ticker;

        function updateWord() {
            const word = words[wordIndex];
            rsvpContainer.innerHTML = `
                <div class="flex font-display-rsvp text-display-rsvp-mobile md:text-display-rsvp tracking-tight">
                    <span class="text-on-surface">${word.start}</span><span class="text-orp-highlight">${word.orp}</span><span class="text-on-surface">${word.end}</span>
                </div>
            `;
            wordIndex = (wordIndex + 1) % words.length;
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playBtn.innerHTML = `<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">pause</span>`;
                pulseGlow.style.opacity = '1';
                ticker = setInterval(updateWord, 60000 / wpm);
            } else {
                playBtn.innerHTML = `<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>`;
                pulseGlow.style.opacity = '0';
                clearInterval(ticker);
            }
        }

        function adjustSpeed() {
            speedModal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function updateWpmVal(val) {
            wpm = val;
            modalWpm.innerText = val;
            wpmDisplay.innerText = val;
            if (isPlaying) {
                clearInterval(ticker);
                ticker = setInterval(updateWord, 60000 / wpm);
            }
        }

        function closeSpeedModal() {
            speedModal.classList.add('opacity-0', 'pointer-events-none');
        }

        // Spacebar shortcut
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });
    </script>
</body></html>
